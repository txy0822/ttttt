name: A股短线选股

on:
  schedule:
    # 每个工作日北京时间 15:30 运行（UTC 7:30）
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare

      - name: Run stock screener
        run: python stock_screener.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add stocks.json
          git diff --cached --quiet || git commit -m "选股结果 $(date +%Y-%m-%d)"
          git push
