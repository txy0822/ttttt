<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短线选股 - 每日候选</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; font-size: 1.6em; color: #7c9cff; margin-bottom: 6px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 24px; font-size: 0.85em; }
        .card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #2a2a4a;
        }
        .card h2 { font-size: 1.05em; color: #7c9cff; margin-bottom: 12px; }
        .info-bar {
            display: flex; justify-content: space-between;
            padding: 10px 16px; background: #12122a;
            border-radius: 8px; margin-bottom: 16px; font-size: 0.9em;
        }
        .info-bar .count { color: #4cdf8b; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { color: #888; text-align: left; padding: 10px 8px; border-bottom: 1px solid #2a2a4a; }
        td { padding: 10px 8px; border-bottom: 1px solid #1f1f3a; }
        .up { color: #ff4d4d; }
</style>
</head>
<body>
<div class="container">
    <h1>短线选股候选</h1>
    <p class="subtitle">每日收盘自动筛选 · 仅供模拟练习参考</p>
<!-- PLACEHOLDER -->
    <div class="card">
        <div class="info-bar">
            <span id="date-info">加载中...</span>
            <span>候选数量：<span class="count" id="count">--</span></span>
        </div>
        <div id="stock-table"></div>
    </div>

    <div class="card">
        <h2>筛选条件</h2>
        <div style="font-size:0.8em;color:#999;line-height:1.8;">
            1. 涨幅 3-5% &nbsp; 2. 量比 > 1 &nbsp; 3. 换手率 5-10%<br>
            4. 流通市值 50-200亿 &nbsp; 5. 近5日量能阶梯放大<br>
            6. 5日/10日/20日均线多头发散向上<br>
            <b style="color:#ff6b6b;">注意：第7、8步（分时强度+尾盘买点）需自行盘中判断</b>
        </div>
    </div>

    <p style="text-align:center;color:#555;font-size:0.75em;margin-top:20px;">
        仅供学习模拟，不构成投资建议。短线有风险，入市需谨慎。
    </p>
</div>

<script>
async function loadStocks() {
    try {
        const resp = await fetch('stocks.json');
        if (!resp.ok) throw new Error('fetch failed');
        const data = await resp.json();

        document.getElementById('date-info').textContent = data.date + ' ' + data.time + ' 收盘筛选';
        document.getElementById('count').textContent = data.count;

        if (data.candidates.length === 0) {
            document.getElementById('stock-table').innerHTML = '<p style="text-align:center;color:#888;padding:20px;">今日无符合全部条件的候选股</p>';
            return;
        }

        let html = `<table><tr>
            <th>代码</th><th>名称</th><th>现价</th>
            <th>涨幅</th><th>量比</th><th>换手率</th>
            <th>流通市值(亿)</th><th>均线状态</th>
        </tr>`;
        data.candidates.forEach(s => {
            html += `<tr>
                <td>${s.code}</td>
                <td>${s.name}</td>
                <td>${s.price}</td>
                <td class="up">+${s.change_pct}%</td>
                <td>${s.volume_ratio}</td>
                <td>${s.turnover_rate}%</td>
                <td>${s.float_cap_yi}</td>
                <td style="font-size:0.75em;color:#4cdf8b;">${s.ma_info}</td>
            </tr>`;
        });
        html += '</table>';
        document.getElementById('stock-table').innerHTML = html;
    } catch (e) {
        document.getElementById('date-info').textContent = '暂无数据，等待首次运行';
    }
}

loadStocks();
</script>
</body>
</html>
